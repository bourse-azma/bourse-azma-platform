name: bourse-azma-platform

volumes:
  bourse-azma-db-data:

services:
  bourse-azma-db:
    image: postgres:14-alpine
    container_name: bourse-azma-db
    environment:
      POSTGRES_DB: bourse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    command: >
      postgres
      -c max_connections=40
      -c shared_buffers=64MB
      -c effective_cache_size=192MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=8MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c synchronous_commit=off
    volumes:
      - bourse-azma-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d bourse" ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 320m
        reservations:
          memory: 96m
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: bourse-azma-redis
    command: >
      redis-server
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --tcp-backlog 511
      --hz 10
      --activerehashing yes
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 96m
        reservations:
          memory: 32m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  tsetmc-api:
    image: tsetmc-api
    build:
      context: ../../tsetmc-api
    container_name: tsetmc-api
    ports:
      - "9000:9000"
    env_file:
      - ../../bourse-azma-ui/.env
    environment:
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "nc -z -w1 localhost 9000 || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 384m
        reservations:
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "200m"
        max-file: "5"

  codal-api:
    image: codal-api
    build:
      context: ../../codal-api
    container_name: codal-api
    ports:
      - "9002:9002"
    env_file:
      - ../../bourse-azma-ui/.env
    environment:
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "nc -z -w1 localhost 9002 || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.60"
          memory: 320m
        reservations:
          memory: 96m
    logging:
      driver: json-file
      options:
        max-size: "200m"
        max-file: "5"

  bourse-azma-api:
    image: bourse-azma-api
    build:
      context: ../../
      dockerfile: bourse-azma-api/Dockerfile
    container_name: bourse-azma-api
    ports:
      - "9003:9003"
    environment:
      SERVER_PORT: 9003
      SPRING_DATASOURCE_URL: jdbc:postgresql://bourse-azma-db:5432/bourse
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_SECURITY_JWT_SECRET: bourse-azma-jwt-secret-key-with-at-least-32-bytes
      APP_MARKET_SEARCH_CSV_PATH: /app/market.csv
      APP_TSETMC_BASE_URL: http://tsetmc-api:9000/tsetmc
      APP_ORDER_MATCHING_ENABLED: "true"
      APP_ORDER_MATCHING_POLL_INTERVAL_MS: 5000
    depends_on:
      bourse-azma-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      tsetmc-api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "nc -z -w1 localhost 9003 || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 448m
        reservations:
          memory: 160m
    logging:
      driver: json-file
      options:
        max-size: "200m"
        max-file: "5"

  bourse-azma-ui:
    image: bourse-azma-ui
    build:
      context: ../../bourse-azma-ui
    container_name: bourse-azma-ui
    ports:
      - "8080:8080"
    depends_on:
      tsetmc-api:
        condition: service_healthy
      codal-api:
        condition: service_healthy
      bourse-azma-api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 64m
        reservations:
          memory: 16m
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "2"
